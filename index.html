<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LLLLuuu_ is here.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #1c1c1e 0%, #0a0a0c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Consolas', 'SF Mono', 'Fira Code', monospace;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* 液态玻璃卡片 - 统一圆角 + 边缘高光（克制） */
        .glass-container {
            position: relative;
            z-index: 10;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            background: rgba(20, 20, 25, 0.35);
            border-radius: 32px;
            padding: 2.5rem 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* 外投影 + 内阴影（仅顶部边缘微光） */
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),           /* 外阴影 */
                inset 0 1px 0 rgba(255, 255, 255, 0.2),    /* 顶部内边缘光 */
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);         /* 底部内暗边 */
            transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
            will-change: transform;
        }

        /* 移除之前的伪元素高光（完全去掉大面积光晕） */
        .glass-container::before,
        .glass-container::after {
            display: none;
        }

        .glass-container:hover {
            transform: scale(1.02);
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .prompt {
            font-family: 'Consolas', 'SF Mono', 'Fira Code', monospace;
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(255,255,255,0.05);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            margin-bottom: 1rem;
        }

        .hero-name {
            font-family: 'Consolas', 'SF Mono', 'Fira Code', monospace;
            font-size: clamp(3.5rem, 15vw, 7rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,240,0.2);
            line-height: 1.1;
        }

        @media (max-width: 500px) {
            .glass-container {
                padding: 1.8rem 2rem;
            }
            .prompt {
                font-size: 1rem;
                padding: 0.1rem 0.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="content">
            <div class="prompt">>>>WhoAmI</div>
            <div class="hero-name">LLLLuuu_</div>
        </div>
    </div>
</body>
</html>
